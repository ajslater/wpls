name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint, Test, and Build (macOS)
  # ---------------------------------------------------------------------------
  # wpls is macOS-only (uses pyobjc-framework-osakit), so the entire pipeline
  # — lint, test, build — runs natively on a macOS runner.
  test:
    name: Lint, Test & Build
    runs-on: macos-latest
    if: |
      github.ref_name == 'main' && github.event_name == 'push' ||
      github.base_ref == 'main' ||
      (github.base_ref == 'develop' && github.head_ref == 'pre-release')
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Only fetch full history for the main push gate
          fetch-depth: ${{ (github.ref_name == 'main' && github.event_name == 'push') && 0 || 1 }}

      - name: Check for Redundant Tests & Existing Dist
        id: gate
        if: github.ref_name == 'main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: bin/ci-download-dist-if-identical.sh

      - name: Set up uv
        if: steps.gate.outputs.dist_found != 'true'
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up bun
        if: steps.gate.outputs.dist_found != 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install Python
        if: steps.gate.outputs.dist_found != 'true'
        run: uv python install

      - name: Install dependencies
        if: steps.gate.outputs.dist_found != 'true'
        run: |
          mkdir -p dist test-results
          make install

      - name: Lint
        if: steps.gate.outputs.dist_found != 'true'
        run: make lint

      - name: Tests
        id: tests
        if: steps.gate.outputs.dist_found != 'true'
        run: make test

      - name: Build Distribution
        if: steps.gate.outputs.dist_found != 'true'
        run: make build

      - name: Upload Test Results
        id: upload-tests
        if: "!cancelled() && steps.tests.outcome != 'skipped'"
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/test-results/pytest/*.xml"

      - name: Publish Test Report
        if: "!cancelled() && steps.upload-tests.outcome == 'success'"
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "**/test-results/pytest/*.xml"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/
          retention-days: 2

  # ---------------------------------------------------------------------------
  # Deploy to PyPI
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: test
    if: github.event_name == 'push' ||
      (github.base_ref == 'develop' && github.head_ref == 'pre-release')
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
